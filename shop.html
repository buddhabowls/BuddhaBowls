<div class="page-header">
  <h1 class="page-title">Shop Our Collection</h1>
  <p class="page-subtitle">Premium eco-friendly products for your healthy lifestyle</p>
</div>

<!-- FILTERS & SORTING -->
<div class="shop-controls">
  <div class="filter-group">
    <button class="filter-btn active" onclick="filterProducts('all')">All Products</button>
    <button class="filter-btn" onclick="filterProducts('bowls')">Coconut Bowls</button>
    <button class="filter-btn" onclick="filterProducts('accessories')">Accessories</button>
    <button class="filter-btn" onclick="filterProducts('ingredients')">Ingredients</button>
  </div>
  <select class="sort-select" id="sortSelect" onchange="sortProducts()">
    <option value="featured">Featured</option>
    <option value="price-low">Price: Low to High</option>
    <option value="price-high">Price: High to Low</option>
    <option value="newest">Newest</option>
    <option value="rating">Top Rated</option>
  </select>
</div>

<!-- PRODUCT GRID -->
<div class="product-grid" id="productGrid">
  <!-- Products will be inserted here by JavaScript -->
</div>

<!-- PRODUCT DETAIL MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content" id="modalContent">
    <!-- Product detail will be inserted here by JavaScript -->
  </div>
  <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
</div>

<!-- SHOPPING CART SIDEBAR -->
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h2><i class="fas fa-shopping-cart"></i> Shopping Cart</h2>
    <button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <i class="fas fa-shopping-bag"></i>
      <p>Your cart is empty</p>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-summary">
      <div class="cart-row">
        <span>Subtotal:</span>
        <span id="subtotal">$0.00</span>
      </div>
      <div class="cart-row">
        <span>Shipping:</span>
        <span id="shipping">$0.00</span>
      </div>
      <div class="cart-row">
        <span>Tax:</span>
        <span id="tax">$0.00</span>
      </div>
    </div>
    <div class="cart-total">
      <span>Total:</span>
      <span id="total">$0.00</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
    <button class="continue-shopping-btn" onclick="toggleCart()">Continue Shopping</button>
  </div>
</div>

<script>

    {

      category: 'ingredients',

      rating: 4.8,
      reviews: 165,
      description: 'Premium organic chia seeds. Rich in omega-3 and fiber.',
      fullDescription: 'Our Premium Organic Chia Seeds are sourced from certified organic farms. Rich in omega-3 fatty acids, fiber, and protein, these seeds are perfect for smoothies, bowls, and puddings.',
      sizes: ['1 lb', '2 lbs'],
      features: ['Organic Certified', 'High Omega-3', 'Rich in Fiber', 'Gluten-Free', 'Non-GMO'],
      badge: 'Popular',
      reviews_list: [
        { author: 'Nina T.', rating: 5, date: '1 week ago', text: 'Perfect quality chia seeds! Great for my smoothie bowls.' }
      ]
    }
  ];

  let cart = [];
  let currentFilter = 'all';
  let currentSort = 'featured';

  function init() {
    displayProducts(products);
  }

  function displayProducts(productsToDisplay) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';

    productsToDisplay.forEach(product => {
      const productCard = document.createElement('div');
      productCard.className = 'product-card';
      productCard.onclick = () => openProductDetail(product);
      
      productCard.innerHTML = `
        <div class="product-image">
          ${product.image}
          ${product.badge ? `<span class="product-badge">${product.badge}</span>` : ''}
        </div>
        <div class="product-info">
          <h3 class="product-name">${product.name}</h3>
          <div class="product-rating">
            ${'⭐'.repeat(Math.floor(product.rating))}
            <span>(${product.reviews})</span>
          </div>
          <p class="product-description">${product.description}</p>
          <div class="product-footer">
            <div>
              ${product.originalPrice ? `<span class="product-price-old">$${product.originalPrice.toFixed(2)}</span>` : ''}
              <span class="product-price">$${product.price.toFixed(2)}</span>
            </div>
            <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart(${product.id})">
              <i class="fas fa-shopping-cart"></i> Add
            </button>
          </div>
        </div>
      `;
      grid.appendChild(productCard);
    });
  }

  function filterProducts(category) {
    currentFilter = category;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    applyFiltersAndSort();
  }

  function sortProducts() {
    currentSort = document.getElementById('sortSelect').value;
    applyFiltersAndSort();
  }

  function applyFiltersAndSort() {
    let filtered = products;

    if (currentFilter !== 'all') {
      filtered = products.filter(p => p.category === currentFilter);
    }

    if (currentSort === 'price-low') {
      filtered.sort((a, b) => a.price - b.price);
    } else if (currentSort === 'price-high') {
      filtered.sort((a, b) => b.price - a.price);
    } else if (currentSort === 'rating') {
      filtered.sort((a, b) => b.rating - a.rating);
    } else if (currentSort === 'newest') {
      filtered.reverse();
    }

    displayProducts(filtered);
  }

  function openProductDetail(product) {
    const modal = document.getElementById('productModal');
    const modalContent = document.getElementById('modalContent');

    let reviewsHTML = product.reviews_list.map(review => `
      <div class="review-item">
        <div class="review-header">
          <span class="review-author">${review.author}</span>
          <span class="review-date">${review.date}</span>
        </div>
        <div class="review-rating">${'⭐'.repeat(review.rating)}</div>
        <p class="review-text">${review.text}</p>
      </div>
    `).join('');

    modalContent.innerHTML = `
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      <div class="product-detail">
        <div class="product-detail-image">${product.image}</div>
        <div class="product-detail-info">
          <h2>${product.name}</h2>
          <div class="product-detail-rating">
            ${'⭐'.repeat(Math.floor(product.rating))} ${product.rating} (${product.reviews} reviews)
          </div>
          <div class="product-detail-price">
            ${product.originalPrice ? `<span class="product-price-old">$${product.originalPrice.toFixed(2)}</span>` : ''}
            $${product.price.toFixed(2)}
          </div>
          <p class="product-detail-description">${product.fullDescription}</p>

          <div class="product-features">
            ${product.features.map(f => `
              <div class="feature-item">
                <i class="fas fa-check-circle"></i> ${f}
              </div>
            `).join('')}
          </div>

          <div class="size-options">
            <label>Select Size:</label>
            <div class="size-buttons">
              ${product.sizes.map((size, idx) => `
                <button class="size-btn ${idx === 0 ? 'active' : ''}" data-size="${size}">${size}</button>
              `).join('')}
            </div>
          </div>

          <div class="quantity-selector">
            <label>Quantity:</label>
            <button class="quantity-btn" onclick="decreaseQty()">−</button>
            <input type="number" class="quantity-input" id="qtyInput" value="1" min="1">
            <button class="quantity-btn" onclick="increaseQty()">+</button>
          </div>

          <div class="detail-buttons">
            <button class="detail-btn detail-btn-primary" onclick="addToCartFromDetail(${product.id})">
              <i class="fas fa-shopping-cart"></i> Add to Cart
            </button>
            <button class="detail-btn detail-btn-secondary" onclick="closeModal()">
              <i class="fas fa-times"></i> Close
            </button>
          </div>

          <div class="reviews-section">
            <h3>Customer Reviews</h3>
            ${reviewsHTML}
          </div>
        </div>
      </div>
    `;

    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      });
    });

    modal.classList.add('active');
  }

  function closeModal() {
    document.getElementById('productModal').classList.remove('active');
  }

  function increaseQty() {
    const input = document.getElementById('qtyInput');
    input.value = parseInt(input.value) + 1;
  }

  function decreaseQty() {
    const input = document.getElementById('qtyInput');
    if (parseInt(input.value) > 1) {
      input.value = parseInt(input.value) - 1;
    }
  }

  function addToCart(productId, quantity = 1) {
    const product = products.find(p => p.id === productId);
    const existingItem = cart.find(item => item.id === productId);

    if (existingItem) {
      existingItem.quantity += quantity;
    } else {
      cart.push({
        ...product,
        quantity: quantity
      });
    }

    updateCart();
    showNotification('Added to cart!');
  }

  function addToCartFromDetail(productId) {
    const quantity = parseInt(document.getElementById('qtyInput').value);
    addToCart(productId, quantity);
    closeModal();
  }

  function removeFromCart(productId) {
    cart = cart.filter(item => item.id !== productId);
    updateCart();
  }

  function updateQuantity(productId, newQuantity) {
    const item = cart.find(item => item.id === productId);
    if (item) {
      item.quantity = Math.max(1, newQuantity);
      updateCart();
    }
  }

  function updateCart() {
    const cartItems = document.getElementById('cartItems');
    const cartBadge = document.getElementById('cartBadge');

    if (cartBadge) {
      cartBadge.textContent = cart.length;
    }

    if (cart.length === 0) {
      cartItems.innerHTML = `
        <div class="cart-empty">
          <i class="fas fa-shopping-bag"></i>
          <p>Your cart is empty</p>
        </div>
      `;
    } else {
      cartItems.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-image">${item.image}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">$${item.price.toFixed(2)}</div>
            <div class="cart-item-controls">
              <button class="cart-item-qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">−</button>
              <span class="cart-item-qty">${item.quantity}</span>
              <button class="cart-item-qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
              <button class="cart-item-remove" onclick="removeFromCart(${item.id})">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    updateCartTotals();
  }

  function updateCartTotals() {
    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const shipping = subtotal > 50 ? 0 : 5.99;
    const tax = subtotal * 0.08;
    const total = subtotal + shipping + tax;

    document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById('shipping').textContent = `$${shipping.toFixed(2)}`;
    document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
    document.getElementById('total').textContent = `$${total.toFixed(2)}`;
  }

  function toggleCart() {
    document.getElementById('cartSidebar').classList.toggle('active');
  }

  function checkout() {
    if (cart.length === 0) {
      alert('Your cart is empty!');
      return;
    }
    alert('Proceeding to checkout... (This is a demo)');
    toggleCart();
  }

  function showNotification(message) {
    const notification = document.createElement('div');
    notification.style.cssText = `
      position: fixed;
      top: 100px;
      right: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      z-index: 3000;
      animation: slideIn 0.3s ease;
    `;
    notification.textContent = message;
    document.body.appendChild(notification);

    setTimeout(() => {
      notification.style.animation = 'slideOut 0.3s ease';
      setTimeout(() => notification.remove(), 300);
    }, 2000);
  }

  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }
  `;
  document.head.appendChild(style);

  window.addEventListener('load', init);
</script>
