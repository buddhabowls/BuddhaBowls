  let filteredProducts = [...products];
  let currentCategory = 'all';

  // Initialize
  function init() {
    displayProducts(products);
  }

  // Display Products
  function displayProducts(productsToDisplay) {
    const grid = document.getElementById('productsGrid');
    const noResults = document.getElementById('noResults');
    const resultCount = document.getElementById('resultCount');

    if (productsToDisplay.length === 0) {
      grid.style.display = 'none';
      noResults.style.display = 'block';
      resultCount.textContent = '0';
      return;
    }

    grid.style.display = 'grid';
    noResults.style.display = 'none';
    resultCount.textContent = productsToDisplay.length;

    grid.innerHTML = productsToDisplay.map(product => `
      <div class="product-card" data-category="${product.category}" data-name="${product.name.toLowerCase()}">
        <div class="product-image">
          ${product.image}
          ${product.badge ? `<span class="product-badge">${product.badge}</span>` : ''}
        </div>
        <div class="product-info">
          <div class="product-category">${product.category}</div>
          <h3>${product.name}</h3>
          <div class="product-rating">
            <div>
              ${Array(5).fill().map((_, i) => `
                <i class="fas fa-star" style="color: ${i < Math.floor(product.rating) ? '#FFD700' : '#ddd'}"></i>
              `).join('')}
            </div>
            <span>(${product.reviews})</span>
          </div>
          <p class="product-description">${product.description}</p>
          <div class="product-footer">
            <div class="product-price">
              ${product.originalPrice ? `<span class="product-price-original">$${product.originalPrice.toFixed(2)}</span>` : ''}
              $${product.price.toFixed(2)}
            </div>
            <button class="product-btn" onclick="addToCart('${product.name}', ${product.price})">
              <i class="fas fa-shopping-cart"></i> Add
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // Filter by Category
  function filterByCategory(category) {
    currentCategory = category;
    
    // Update button states
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    event.target.classList.add('active');

    filterProducts();
  }

  // Filter Products
  function filterProducts() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    filteredProducts = products.filter(product => {
      const matchesCategory = currentCategory === 'all' || product.category === currentCategory;
      const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
                           product.description.toLowerCase().includes(searchTerm);
      return matchesCategory && matchesSearch;
    });

    displayProducts(filteredProducts);
  }

  // Sort Products
  function sortProducts() {
    const sortValue = document.getElementById('sortSelect').value;
    let sorted = [...filteredProducts];

    switch(sortValue) {
      case 'price-low':
        sorted.sort((a, b) => a.price - b.price);
        break;
      case 'price-high':
        sorted.sort((a, b) => b.price - a.price);
        break;
      case 'newest':
        sorted.sort((a, b) => b.id - a.id);
        break;
      case 'popular':
        sorted.sort((a, b) => b.reviews - a.reviews);
        break;
      case 'featured':
      default:
        sorted = [...filteredProducts];
    }

    displayProducts(sorted);
  }

  // Add to Cart
  function addToCart(productName, price) {
    const notification = document.createElement('div');
    notification.style.cssText = `
      position: fixed;
      top: 100px;
      right: 20px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      z-index: 3000;
      animation: slideIn 0.3s ease;
    `;
    notification.textContent = 'Added "' + productName + '" to cart!';
    document.body.appendChild(notification);

    setTimeout(() => {
      notification.style.animation = 'slideOut 0.3s ease';
      setTimeout(() => notification.remove(), 300);
    }, 2000);
  }

  // Add animations
  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }
  `;
  document.head.appendChild(style);

  // Initialize on page load
  window.addEventListener('load', init);
</script>
