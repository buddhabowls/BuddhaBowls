title: Buddha Bowls
description: Premium handcrafted coconut bowls and healthy recipes
url: "https://buddhabowls.org"
baseurl: ""
theme: minima

# Collections
collections:
  recipes:
    output: true
    permalink: /recipes/:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_recipes"
    values:
      layout: "recipe"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Permalink structure
permalink: /:title/

# Collections
collections:
  recipes:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
# Error pages
error_page: 404.html

collections:
  products:
    output: true
    permalink: /product/:slug/

collections:
  quizzes:
    output: true
    permalink: /quizzes/:slug/
include:
  - _data
# Ensure indexing is enabled
noindex: false

# Optional: Add these for better SEO
title: "Buddha Bowls"
description: "Coconut Bowls & Recipes"
author: "Buddha Bowls"
